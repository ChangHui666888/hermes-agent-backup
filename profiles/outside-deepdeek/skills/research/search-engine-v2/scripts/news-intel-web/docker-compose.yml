services:
  backend:
    build: ./backend
    volumes:
      - ${EVENT_REGISTRY_PATH:-./data}:/data:ro
    environment:
      - DB_PATH=/data/news_intel.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - frontend
